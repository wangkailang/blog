<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Web Video Presentation Skill cover</title>
  <desc id="desc">An editorial cover about turning an article into a step-driven web video via AI agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="0.5" stop-color="#eef0f7"/>
      <stop offset="1" stop-color="#f3eef0"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef1f6"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#eee8db"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#152033" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#152033" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.35" stroke="#b3bcc8" stroke-width="1">
    <path d="M0 200 H1600"/>
    <path d="M0 320 H1600"/>
    <path d="M0 440 H1600"/>
    <path d="M0 560 H1600"/>
    <path d="M0 680 H1600"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="120" y="166" width="220" height="290" rx="10" fill="url(#paper)" stroke="#d6cebb"/>
    <g fill="#3b3a35">
      <rect x="146" y="200" width="120" height="10" rx="5"/>
    </g>
    <g fill="#9b958a">
      <rect x="146" y="232" width="168" height="6" rx="3"/>
      <rect x="146" y="250" width="158" height="6" rx="3"/>
      <rect x="146" y="268" width="170" height="6" rx="3"/>
      <rect x="146" y="286" width="142" height="6" rx="3"/>
      <rect x="146" y="312" width="168" height="6" rx="3"/>
      <rect x="146" y="330" width="160" height="6" rx="3"/>
      <rect x="146" y="348" width="172" height="6" rx="3"/>
      <rect x="146" y="366" width="130" height="6" rx="3"/>
      <rect x="146" y="392" width="160" height="6" rx="3"/>
      <rect x="146" y="410" width="148" height="6" rx="3"/>
    </g>
    <text x="146" y="186" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#7a7368" letter-spacing="2">ARTICLE.MD</text>
  </g>

  <g stroke="#4b5563" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M362 304 L424 304"/>
    <path d="M412 292 L424 304 L412 316"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="446" y="174" width="276" height="156" rx="12" fill="url(#frame)" stroke="#cfd6df"/>
    <text x="464" y="200" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">STEP 1 · CONTRAST</text>
    <g>
      <rect x="464" y="218" width="116" height="86" rx="6" fill="#eef3f9" stroke="#d4dbe5"/>
      <text x="522" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#1f2937">SFT+RLHF</text>
      <rect x="592" y="218" width="116" height="86" rx="6" fill="#1f2937"/>
      <text x="650" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#a7f3d0">纯 RL</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="744" y="174" width="276" height="156" rx="12" fill="url(#frame)" stroke="#cfd6df"/>
    <text x="762" y="200" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">STEP 2 · HERO QUOTE</text>
    <text x="882" y="252" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" font-weight="700" fill="#1f2937">"零标注"</text>
    <text x="882" y="284" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5b6573">连一条思维链都没用</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="446" y="354" width="276" height="156" rx="12" fill="url(#frame)" stroke="#cfd6df"/>
    <text x="464" y="380" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">STEP 3 · DATA REVEAL</text>
    <g>
      <text x="478" y="430" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#1f2937">15.6%</text>
      <text x="586" y="430" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#9aa3b1">→</text>
      <text x="618" y="430" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#15803d">71.0%</text>
    </g>
    <path d="M464 488 L506 472 L548 484 L590 452 L632 458 L674 426 L708 416" fill="none" stroke="#22a06b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="708" cy="416" r="5" fill="#22a06b"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="744" y="354" width="276" height="156" rx="12" fill="url(#frame)" stroke="#cfd6df"/>
    <text x="762" y="380" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">STEP 4 · LIST REVEAL</text>
    <g>
      <circle cx="772" cy="412" r="5" fill="#1f2937"/>
      <rect x="788" y="406" width="180" height="10" rx="5" fill="#1f2937"/>
      <circle cx="772" cy="442" r="5" fill="#1f2937"/>
      <rect x="788" y="436" width="156" height="10" rx="5" fill="#1f2937"/>
      <circle cx="772" cy="472" r="5" fill="#cdd5df"/>
      <rect x="788" y="466" width="168" height="10" rx="5" fill="#cdd5df"/>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1058" y="174" width="408" height="336" rx="16" fill="url(#dark)" stroke="#344055"/>
    <rect x="1086" y="206" width="100" height="20" rx="10" fill="#a7f3d0"/>
    <text x="1136" y="221" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#022c22" letter-spacing="1">SKILL.md</text>

    <text x="1086" y="262" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#cbd5e1">Phase 1  内容编写</text>
    <text x="1086" y="288" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#fcd34d" font-weight="700">▸ Checkpoint · 5 件事</text>
    <text x="1086" y="314" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#cbd5e1">Phase 2  网页开发</text>
    <text x="1106" y="338" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#94a3b8">第 1 章  anchor</text>
    <text x="1106" y="358" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#94a3b8">第 2~N 章  A / B / C</text>
    <text x="1086" y="384" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#fcd34d" font-weight="700">▸ Checkpoint · 音频</text>
    <text x="1086" y="410" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#cbd5e1">Phase 3  合成 MP3</text>
    <text x="1086" y="436" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#cbd5e1">Phase 4  录屏 + 后期</text>

    <g stroke="#475569" stroke-width="1" stroke-dasharray="4 4">
      <path d="M1086 470 H1438"/>
    </g>
    <text x="1086" y="492" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#94a3b8">narrations.ts · 唯一真相源</text>
  </g>

  <g>
    <rect x="120" y="84" width="200" height="44" rx="22" fill="#111827"/>
    <text x="220" y="112" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="1">AI Skill 拆解</text>
  </g>

  <text x="120" y="722" font-family="'Helvetica Neue', Arial, Helvetica, sans-serif" font-size="74" font-weight="900" fill="#111827" letter-spacing="-1">从一篇文章到一支视频</text>
  <text x="124" y="772" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#4b5563">拆解 web-video-presentation Skill 的执行流程与自检策略</text>

  <g fill="#9aa3b1" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" letter-spacing="2">
    <text x="120" y="820">PHASE · CHECKPOINT · SINGLE SOURCE OF TRUTH · SELF-CHECK</text>
  </g>
</svg>
