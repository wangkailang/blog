<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Skills For Real Engineers cover</title>
  <desc id="desc">An editorial cover about composing small AI agent skills for real engineering work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f7fb"/>
      <stop offset="0.5" stop-color="#eef1f7"/>
      <stop offset="1" stop-color="#efeaf0"/>
