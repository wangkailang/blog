      <text x="436" y="458" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">small interface</text>
      <g fill="#cbd5e1">
        <rect x="436" y="468" width="42" height="22" rx="3"/>
        <rect x="484" y="468" width="42" height="22" rx="3"/>
        <rect x="532" y="468" width="42" height="22" rx="3"/>
        <rect x="580" y="468" width="42" height="22" rx="3"/>
        <rect x="628" y="468" width="48" height="22" rx="3"/>
      </g>
