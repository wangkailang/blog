    <text x="436" y="380" font-family="Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">/IMPROVE-ARCHITECTURE</text>
    <text x="436" y="408" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">Deep Modules</text>
