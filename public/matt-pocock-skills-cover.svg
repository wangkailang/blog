      <text x="314" y="438" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#3730a3">5</text>
      <rect x="338" y="424" width="32" height="20" rx="4" fill="#eef2ff" stroke="#c7d2fe"/>
      <text x="354" y="438" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#3730a3">6</text>
    </g>
    <text x="138" y="478" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" fill="#4b5563">"Build the loop. Bug is 90% fixed."</text>
  </g>

