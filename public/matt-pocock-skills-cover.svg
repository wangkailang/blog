    <text x="1044" y="432" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#e2e8f0">and composable."</text>

    <text x="1044" y="476" font-family="Menlo, Consolas, monospace" font-size="11" fill="#94a3b8" letter-spacing="1">$ npx skills@latest add</text>
    <text x="1044" y="492" font-family="Menlo, Consolas, monospace" font-size="11" fill="#94a3b8" letter-spacing="1">  mattpocock/skills</text>
  </g>

  <text x="120" y="722" font-family="'Helvetica Neue', Arial, Helvetica, sans-serif" font-size="68" font-weight="900" fill="#111827" letter-spacing="-1">Skills For Real Engineers</text>
  <text x="124" y="772" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#4b5563">把"工程师本能"塞进 AI Agent 的一套实战工具集</text>

  <g fill="#9aa3b1" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" letter-spacing="2">
