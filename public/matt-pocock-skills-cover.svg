      <text x="1198" y="290" fill="#94a3b8">→</text>
      <text x="1218" y="290" fill="#fcd34d" font-family="Menlo, Consolas, monospace">/grill-with-docs</text>

      <rect x="1044" y="302" width="14" height="14" rx="3" fill="#fcd34d"/>
      <text x="1066" y="314" fill="#e2e8f0">Verbosity</text>
      <text x="1198" y="314" fill="#94a3b8">→</text>
      <text x="1218" y="314" fill="#fcd34d" font-family="Menlo, Consolas, monospace">shared language</text>

      <rect x="1044" y="326" width="14" height="14" rx="3" fill="#fcd34d"/>
      <text x="1066" y="338" fill="#e2e8f0">Broken code</text>
      <text x="1198" y="338" fill="#94a3b8">→</text>
      <text x="1218" y="338" fill="#fcd34d" font-family="Menlo, Consolas, monospace">/tdd · /diagnose</text>

      <rect x="1044" y="350" width="14" height="14" rx="3" fill="#fcd34d"/>
      <text x="1066" y="362" fill="#e2e8f0">Ball of mud</text>
      <text x="1198" y="362" fill="#94a3b8">→</text>
      <text x="1218" y="362" fill="#fcd34d" font-family="Menlo, Consolas, monospace">/improve-arch</text>
