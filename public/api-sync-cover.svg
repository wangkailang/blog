<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">api-sync skill cover</title>
  <desc id="desc">An editorial cover about syncing Apifox OpenAPI contracts with frontend src/api code.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f7fb"/>
      <stop offset="0.5" stop-color="#eef1f7"/>
      <stop offset="1" stop-color="#eaeef6"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf0f6"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#152033" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#152033" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.32" stroke="#b3bcc8" stroke-width="1">
    <path d="M0 200 H1600"/>
    <path d="M0 320 H1600"/>
    <path d="M0 440 H1600"/>
    <path d="M0 560 H1600"/>
    <path d="M0 680 H1600"/>
  </g>

  <g>
    <rect x="120" y="84" width="280" height="44" rx="22" fill="#111827"/>
    <text x="260" y="112" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="1">CONTRACT SYNC · 巡检</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="174" width="276" height="156" rx="12" fill="url(#frame)" stroke="#cfd6df"/>
    <text x="138" y="200" font-family="Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">/API-SYNC PULL</text>
    <text x="138" y="232" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" fill="#111827">拉最新契约 · 归档快照</text>
    <g fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="12">
      <text x="138" y="262">· Apifox OpenAPI export</text>
      <text x="138" y="282">· ISO 时间戳快照</text>
      <text x="138" y="302">· 自动 diff 上一份</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="418" y="174" width="276" height="156" rx="12" fill="url(#frame)" stroke="#cfd6df"/>
    <text x="436" y="200" font-family="Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">/API-SYNC DIFF</text>
    <text x="436" y="232" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" fill="#111827">Schema Signature</text>
    <g font-family="Menlo, Consolas, monospace" font-size="11">
      <text x="436" y="258" fill="#64748b">array&lt;object{id,name}&gt;</text>
      <text x="436" y="278" fill="#94a3b8">↓</text>
      <text x="436" y="298" fill="#16a34a">+ field tags: array&lt;string&gt;</text>
      <text x="436" y="316" fill="#dc2626">~ required +: title</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="716" y="174" width="276" height="156" rx="12" fill="url(#frame)" stroke="#cfd6df"/>
    <text x="734" y="200" font-family="Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">/API-SYNC ALIGN</text>
    <text x="734" y="232" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" fill="#111827">前端对齐检查</text>
    <g>
      <rect x="734" y="252" width="120" height="20" rx="3" fill="#fee2e2" stroke="#fca5a5"/>
      <text x="794" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#991b1b">缺接口 ×2</text>
      <rect x="862" y="252" width="120" height="20" rx="3" fill="#fee2e2" stroke="#fca5a5"/>
      <text x="922" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#991b1b">body 差异 ×3</text>
      <rect x="734" y="280" width="120" height="20" rx="3" fill="#fef3c7" stroke="#fde68a"/>
      <text x="794" y="294" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#92400e">方法不一致 ×1</text>
      <rect x="862" y="280" width="120" height="20" rx="3" fill="#e0e7ff" stroke="#c7d2fe"/>
      <text x="922" y="294" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#3730a3">前端独有 ×5</text>
    </g>
    <text x="734" y="320" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">扫 services + types · 报告，不动代码</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="354" width="276" height="156" rx="12" fill="url(#frame)" stroke="#cfd6df"/>
    <text x="138" y="380" font-family="Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">SNAPSHOT 历史</text>
    <text x="138" y="408" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">Byte-identical 跳过</text>
    <g font-family="Menlo, Consolas, monospace" font-size="10">
      <rect x="138" y="424" width="232" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="146" y="438" fill="#475569">openapi.2026-05-10T03-12-45.json</text>
      <rect x="138" y="450" width="232" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="146" y="464" fill="#475569">openapi.2026-05-12T09-04-22.json</text>
      <rect x="138" y="476" width="232" height="20" rx="3" fill="#fef3c7" stroke="#fcd34d"/>
      <text x="146" y="490" fill="#92400e" font-weight="700">openapi.2026-05-14T07-05-22.json</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="418" y="354" width="276" height="156" rx="12" fill="url(#frame)" stroke="#cfd6df"/>
    <text x="436" y="380" font-family="Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">MCP vs SKILL</text>
    <text x="436" y="408" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">互补，不是替代</text>
    <g font-family="Arial, Helvetica, sans-serif" font-size="11">
      <rect x="436" y="424" width="116" height="22" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
      <text x="494" y="439" text-anchor="middle" font-weight="700" fill="#1e40af">MCP · 实时查询</text>
      <text x="558" y="439" fill="#94a3b8">+</text>
      <rect x="572" y="424" width="116" height="22" rx="4" fill="#fef3c7" stroke="#fcd34d"/>
      <text x="630" y="439" text-anchor="middle" font-weight="700" fill="#92400e">SKILL · 周期巡检</text>
    </g>
    <g fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11">
      <text x="436" y="468">· MCP 没有 diff 概念</text>
      <text x="436" y="486">· MCP 不读你的代码</text>
      <text x="436" y="504">· Skill 0 token · 离线可跑</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="716" y="354" width="276" height="156" rx="12" fill="url(#frame)" stroke="#cfd6df"/>
    <text x="734" y="380" font-family="Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#9aa3b1" letter-spacing="2">/API-SYNC APPLY · 路线图</text>
    <text x="734" y="408" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">自动生成 services + types</text>
    <g font-family="Menlo, Consolas, monospace" font-size="11">
      <rect x="734" y="424" width="240" height="20" rx="3" fill="#0f172a"/>
      <text x="742" y="438" fill="#a7f3d0">$ apply "POST /products"</text>
      <text x="734" y="464" fill="#64748b">→ pending/POST_products.patch</text>
      <text x="734" y="482" fill="#64748b">→ services.preview.ts</text>
      <text x="734" y="500" fill="#64748b">→ 人 review 后才落盘</text>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1016" y="174" width="450" height="336" rx="16" fill="url(#dark)" stroke="#344055"/>

    <rect x="1044" y="206" width="160" height="22" rx="11" fill="#a7f3d0"/>
    <text x="1124" y="222" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#022c22" letter-spacing="1">APIFOX → SRC/API</text>

    <text x="1044" y="262" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#cbd5e1">3 命令 · 不动业务代码</text>

    <g font-family="Arial, Helvetica, sans-serif" font-size="13">
      <rect x="1044" y="278" width="14" height="14" rx="3" fill="#fcd34d"/>
      <text x="1066" y="290" fill="#e2e8f0">拉最新契约</text>
      <text x="1198" y="290" fill="#94a3b8">→</text>
      <text x="1218" y="290" fill="#fcd34d" font-family="Menlo, Consolas, monospace">/api-sync pull</text>

      <rect x="1044" y="302" width="14" height="14" rx="3" fill="#fcd34d"/>
      <text x="1066" y="314" fill="#e2e8f0">比对历史变更</text>
      <text x="1198" y="314" fill="#94a3b8">→</text>
      <text x="1218" y="314" fill="#fcd34d" font-family="Menlo, Consolas, monospace">/api-sync diff</text>

      <rect x="1044" y="326" width="14" height="14" rx="3" fill="#fcd34d"/>
      <text x="1066" y="338" fill="#e2e8f0">前后端对齐</text>
      <text x="1198" y="338" fill="#94a3b8">→</text>
      <text x="1218" y="338" fill="#fcd34d" font-family="Menlo, Consolas, monospace">/api-sync align</text>

      <rect x="1044" y="350" width="14" height="14" rx="3" fill="#64748b"/>
      <text x="1066" y="362" fill="#94a3b8">自动生成接口</text>
      <text x="1198" y="362" fill="#94a3b8">→</text>
      <text x="1218" y="362" fill="#94a3b8" font-family="Menlo, Consolas, monospace">/api-sync apply (TBD)</text>
    </g>

    <g stroke="#475569" stroke-width="1" stroke-dasharray="4 4">
      <path d="M1044 386 H1438"/>
    </g>

    <text x="1044" y="412" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#e2e8f0">"信息发现 + 报告生成。</text>
    <text x="1044" y="432" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#e2e8f0">控制权留给人。"</text>

    <text x="1044" y="476" font-family="Menlo, Consolas, monospace" font-size="11" fill="#94a3b8" letter-spacing="1">$ node .claude/skills/api-sync/</text>
    <text x="1044" y="492" font-family="Menlo, Consolas, monospace" font-size="11" fill="#94a3b8" letter-spacing="1">  scripts/fetch-apifox.mjs</text>
  </g>

  <text x="120" y="722" font-family="'Helvetica Neue', Arial, Helvetica, sans-serif" font-size="92" font-weight="900" fill="#111827" letter-spacing="-2">api-sync</text>
  <text x="124" y="772" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#4b5563">把 Apifox 接口契约和前端 src/api 对齐做成一个 Skill</text>

  <g fill="#9aa3b1" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" letter-spacing="2">
    <text x="120" y="820">PULL · DIFF · ALIGN · APPLY (TBD) · NO BUSINESS CODE TOUCHED</text>
  </g>
</svg>
